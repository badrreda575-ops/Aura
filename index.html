<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | Modern Landing Page</title>
    <!-- Use Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Link external CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="bg-glow"></div>

    <nav>
        <div class="logo">Aura.</div>
        <div class="nav-links">
            <a href="#features">Features</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <main>
        <div class="hero">
            <h1>
                <span class="text-gradient">Build beautiful</span><br>
                <span class="text-gradient">experiences</span> <span class="text-accent">faster.</span>
            </h1>
            <p class="subtitle">
                A sleek, modern template built with pure HTML and CSS. Featuring smooth animations, dark-mode styling,
                and premium glassmorphism effects.
            </p>
            <div class="cta-group">
                <a href="#" class="btn btn-primary">Get Started Now</a>
                <a href="#" class="btn btn-secondary">View Documentation</a>
            </div>
        </div>

        <div class="glass-card">
            <div class="skeleton-header">
                <div class="dot" style="background: #ef4444"></div>
                <div class="dot" style="background: #f59e0b"></div>
                <div class="dot" style="background: #10b981"></div>
            </div>
            <div class="skeleton-block"></div>
            <div style="display: flex; flex-direction: column; gap: 0.8rem;">
                <div class="skeleton-text-1"></div>
                <div class="skeleton-text-2"></div>
            </div>
            <div class="skeleton-row">
                <div class="skeleton-item"></div>
                <div class="skeleton-item"></div>
            </div>
        </div>
    </main>

    <!-- Project interacting scripts -->
    <script src="main.js"></script>
</body>

</html>
